<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complex Number Multiplication Visualizer</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- p5.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        
        body {
            font-family: 'JetBrains Mono', monospace;
            background-color: #0f172a; /* Slate 900 */
            color: #e2e8f0;
            overflow: hidden; 
        }

        /* Custom scrollbar for panel */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #1e293b; 
        }
        ::-webkit-scrollbar-thumb {
            background: #475569; 
            border-radius: 3px;
        }

        .input-group label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #94a3b8;
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(8px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="h-screen w-screen flex">

    <!-- Sidebar Controls -->
    <div class="glass-panel w-80 h-full flex flex-col p-6 z-10 shadow-2xl relative">
        <h1 class="text-xl font-bold text-cyan-400 mb-1">Argand Diagram</h1>
        <p class="text-xs text-slate-400 mb-6">Complex Multiplication Geometry</p>

        <!-- Initial Z Input -->
        <div class="mb-6 border-b border-slate-700 pb-4">
            <h2 class="text-sm font-bold text-white mb-3 flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-cyan-400"></span> Current Z
            </h2>
            <div class="grid grid-cols-2 gap-2">
                <div class="input-group">
                    <label>Real (a)</label>
                    <input type="number" id="z-real" value="1" step="0.1" 
                           class="w-full bg-slate-800 border border-slate-600 rounded px-2 py-1 text-sm focus:border-cyan-400 focus:outline-none transition-colors">
                </div>
                <div class="input-group">
                    <label>Imag (b)</label>
                    <input type="number" id="z-imag" value="0.5" step="0.1" 
                           class="w-full bg-slate-800 border border-slate-600 rounded px-2 py-1 text-sm focus:border-cyan-400 focus:outline-none transition-colors">
                </div>
            </div>
            
            <!-- Live Stats for Z -->
            <div class="mt-3 text-xs text-slate-400 space-y-1 bg-slate-800/50 p-2 rounded">
                <div class="flex justify-between">
                    <span>|z| (Mag):</span>
                    <span id="stat-mag" class="text-cyan-300 font-bold">0.00</span>
                </div>
                <div class="flex justify-between">
                    <span>θ (Arg):</span>
                    <span id="stat-arg" class="text-cyan-300 font-bold">0°</span>
                </div>
            </div>
        </div>

        <!-- Multiplier Input -->
        <div class="mb-6 border-b border-slate-700 pb-4">
            <h2 class="text-sm font-bold text-white mb-3 flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-pink-500"></span> Multiplier
            </h2>
            <div class="grid grid-cols-2 gap-2">
                <div class="input-group">
                    <label>Real (a)</label>
                    <input type="number" id="m-real" value="1.1" step="0.1" 
                           class="w-full bg-slate-800 border border-slate-600 rounded px-2 py-1 text-sm focus:border-pink-500 focus:outline-none transition-colors">
                </div>
                <div class="input-group">
                    <label>Imag (b)</label>
                    <input type="number" id="m-imag" value="0.2" step="0.1" 
                           class="w-full bg-slate-800 border border-slate-600 rounded px-2 py-1 text-sm focus:border-pink-500 focus:outline-none transition-colors">
                </div>
            </div>
             <!-- Live Stats for Multiplier -->
             <div class="mt-3 text-xs text-slate-400 space-y-1 bg-slate-800/50 p-2 rounded">
                <div class="flex justify-between">
                    <span>|z| (Mag):</span>
                    <span id="m-stat-mag" class="text-pink-300 font-bold">0.00</span>
                </div>
                <div class="flex justify-between">
                    <span>θ (Arg):</span>
                    <span id="m-stat-arg" class="text-pink-300 font-bold">0°</span>
                </div>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="mt-auto space-y-3">
            <button id="btn-multiply" class="w-full bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 text-white font-bold py-3 rounded shadow-lg transform transition active:scale-95 flex justify-center items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd" />
                </svg>
                Multiply
            </button>
            
            <button id="btn-reset" class="w-full bg-slate-700 hover:bg-slate-600 text-slate-200 font-semibold py-2 rounded transition active:scale-95">
                Reset
            </button>
        </div>
    </div>

    <!-- Canvas Container -->
    <div id="canvas-container" class="flex-grow h-full relative cursor-crosshair">
        <!-- Overlay Instructions -->
        <div class="absolute top-4 right-4 text-right pointer-events-none opacity-50 text-xs">
            <p>Scroll to Zoom Manually</p>
            <p>Drag to Pan</p>
        </div>
    </div>

    <script>
        // Complex Number Utility Class
        class Complex {
            constructor(re, im) {
                this.re = Number(re);
                this.im = Number(im);
            }

            mult(c) {
                return new Complex(
                    this.re * c.re - this.im * c.im,
                    this.re * c.im + this.im * c.re
                );
            }

            mag() {
                return Math.sqrt(this.re * this.re + this.im * this.im);
            }

            arg() { // Returns radians
                return Math.atan2(this.im, this.re);
            }
            
            argDeg() {
                let deg = this.arg() * (180 / Math.PI);
                return deg.toFixed(1);
            }
        }

        // Global State
        let currentZ;
        let multiplierZ;
        let trail = []; // Array of {re, im}
        let animationState = {
            active: false,
            startZ: null,
            targetZ: null,
            progress: 0,
            duration: 60 // frames
        };

        // Viewport State
        let zoom = 100; // pixels per unit
        let targetZoom = 100;
        let offsetX = 0;
        let offsetY = 0;

        // UI Elements
        const inputs = {
            zRe: document.getElementById('z-real'),
            zIm: document.getElementById('z-imag'),
            mRe: document.getElementById('m-real'),
            mIm: document.getElementById('m-imag'),
            statMag: document.getElementById('stat-mag'),
            statArg: document.getElementById('stat-arg'),
            mStatMag: document.getElementById('m-stat-mag'),
            mStatArg: document.getElementById('m-stat-arg'),
        };

        function setup() {
            const container = document.getElementById('canvas-container');
            const canvas = createCanvas(container.clientWidth, container.clientHeight);
            canvas.parent('canvas-container');
            
            updateFromInputs(); // Initialize values from HTML inputs

            // Event Listeners
            document.getElementById('btn-multiply').addEventListener('click', triggerMultiplication);
            document.getElementById('btn-reset').addEventListener('click', resetVisualization);
            
            // Input Listeners
            ['z-real', 'z-imag', 'm-real', 'm-imag'].forEach(id => {
                document.getElementById(id).addEventListener('input', () => {
                    if (!animationState.active) updateFromInputs();
                });
            });
        }

        function windowResized() {
            const container = document.getElementById('canvas-container');
            resizeCanvas(container.clientWidth, container.clientHeight);
        }

        function updateFromInputs() {
            // Only allow updating Z from inputs if we haven't started a multiplication chain
            // or if we just reset.
            if(trail.length === 0) {
                currentZ = new Complex(inputs.zRe.value, inputs.zIm.value);
            }
            multiplierZ = new Complex(inputs.mRe.value, inputs.mIm.value);
            updateStatsUI();
        }

        function updateStatsUI() {
            // Current Z Stats
            let dispZ = currentZ;
            // If animating, we might want to show the interpolated value, 
            // but usually showing the target or static current is less confusing numerically.
            // Let's show the 'Active' value.
            
            inputs.statMag.innerText = dispZ.mag().toFixed(2);
            inputs.statArg.innerText = dispZ.argDeg() + "°";

            // Multiplier Stats
            inputs.mStatMag.innerText = multiplierZ.mag().toFixed(2);
            inputs.mStatArg.innerText = multiplierZ.argDeg() + "°";
        }

        function triggerMultiplication() {
            if (animationState.active) {
                // If already animating, fast forward to end and start next
                finishAnimation();
            }

            let start = currentZ;
            let target = currentZ.mult(multiplierZ);
            
            // Add start point to trail
            trail.push({re: start.re, im: start.im});

            animationState.startZ = start;
            animationState.targetZ = target;
            animationState.active = true;
            animationState.progress = 0;
            
            // Update input fields to reflect new reality (optional, but good for continuity)
            // inputs.zRe.value = target.re.toFixed(2);
            // inputs.zIm.value = target.im.toFixed(2);
        }

        function finishAnimation() {
            currentZ = animationState.targetZ;
            animationState.active = false;
            animationState.progress = 0;
            updateStatsUI();
        }

        function resetVisualization() {
            trail = [];
            inputs.zRe.value = 1;
            inputs.zIm.value = 0.5;
            currentZ = new Complex(1, 0.5);
            animationState.active = false;
            targetZoom = 100;
            offsetX = 0;
            offsetY = 0;
            updateFromInputs();
        }

        function mouseDragged() {
            if (mouseX > 0 && mouseX < width && mouseY > 0 && mouseY < height) {
                offsetX += movedX;
                offsetY += movedY;
            }
        }
        
        function mouseWheel(event) {
            // Zoom centered on mouse logic is complex, simpler is zoom center screen
            let zoomSensitivity = 0.05;
            if (event.delta > 0) {
                targetZoom *= (1 - zoomSensitivity);
            } else {
                targetZoom *= (1 + zoomSensitivity);
            }
            return false; // prevent default scrolling
        }

        function draw() {
            background(15, 23, 42); // Match bg-slate-900

            // 1. Handle Animation Logic
            let renderZ = currentZ;
            
            if (animationState.active) {
                // Easing function (Ease Out Cubic)
                let t = animationState.progress / animationState.duration;
                t = 1 - Math.pow(1 - t, 3); 

                // Interpolate Polar coordinates for geometric intuition
                let startMag = animationState.startZ.mag();
                let endMag = animationState.targetZ.mag();
                let curMag = lerp(startMag, endMag, t);

                let startArg = animationState.startZ.arg();
                let endArg = animationState.targetZ.arg();
                
                // Handle angle wrapping (shortest path)
                let diff = endArg - startArg;
                while (diff < -PI) diff += TWO_PI;
                while (diff > PI) diff -= TWO_PI;
                let curArg = startArg + diff * t;

                // Convert back to Rectangular for drawing
                renderZ = new Complex(
                    curMag * Math.cos(curArg),
                    curMag * Math.sin(curArg)
                );

                animationState.progress++;
                if (animationState.progress >= animationState.duration) {
                    finishAnimation();
                }
            }

            // 2. Auto-Zoom Logic
            // Calculate required bounds to see origin, current vector, and maybe trail
            let maxDist = Math.max(renderZ.mag(), 2); // At least show unit circle clearly
            // Check trail if it exists
            if (trail.length > 0) {
                // Check the last few points to ensure we don't lose context
                let lastT = trail[trail.length-1];
                let dist = Math.sqrt(lastT.re**2 + lastT.im**2);
                maxDist = Math.max(maxDist, dist);
            }

            // Ideal zoom: fit maxDist within about 40% of screen height/width
            let minDimension = Math.min(width, height);
            let idealZoom = (minDimension * 0.35) / maxDist;
            
            // Smoothly interpolate zoom
            if(!mouseIsPressed) { // Don't auto-zoom while panning
                 targetZoom = lerp(targetZoom, idealZoom, 0.05);
            }
            zoom = lerp(zoom, targetZoom, 0.1);

            // 3. Transformations
            push();
            translate(width / 2 + offsetX, height / 2 + offsetY);
            
            // Standard Math Coordinate system: Y is up.
            // p5 Y is down. We scale(1, -1) to flip Y.
            // Note: Text will be drawn upside down if we aren't careful.
            // I prefer calculating y = -y manually for drawing coordinates to keep text simple.
            
            drawGrid();
            drawAxes();
            drawUnitCircle();
            drawTrail(renderZ);
            
            // Draw Multiplier Ghost Vector (relative to 1)
            // We want to show "This is what we are multiplying by"
            // We draw it starting from origin, faint pink
            drawVector(multiplierZ, color(236, 72, 153, 100), 2, false); // Pink-500

            // Draw Current Vector (Bold Cyan)
            drawVector(renderZ, color(34, 211, 238), 4, true); // Cyan-400

            pop();

            // Update UI stats to match animation
            if(animationState.active) {
                 inputs.statMag.innerText = renderZ.mag().toFixed(2);
                 inputs.statArg.innerText = renderZ.argDeg() + "°";
            }
        }

        function toScreen(val) {
            return val * zoom;
        }

        function drawGrid() {
            stroke(51, 65, 85); // Slate 700
            strokeWeight(1);

            // Determine grid step size based on zoom
            // We want grid lines roughly every 50-100 pixels
            let step = 1;
            let pixelStep = step * zoom;
            
            while(pixelStep < 40) { step *= 2; pixelStep = step * zoom; }
            while(pixelStep > 150) { step /= 2; pixelStep = step * zoom; }

            // Calculate visible bounds
            let left = -(width/2 + offsetX) / zoom;
            let right = (width/2 - offsetX) / zoom;
            let top = (height/2 - offsetY) / zoom; // Y is flipped in math logic, but top in p5 is negative relative to center if y-up
            let bottom = -(height/2 + offsetY) / zoom;

            // p5 coordinates for bounds (remember we haven't flipped Y scale yet)
            // Left/Right is easy. Top/Bottom:
            // Top of screen is y = -height/2 (relative to center)
            // Bottom is y = height/2
            
            // Vertical Lines
            let startX = Math.floor(-(width/2 + offsetX) / zoom / step) * step;
            let endX = Math.ceil((width/2 - offsetX) / zoom / step) * step;
            
            for (let x = startX; x <= endX; x += step) {
                let sx = x * zoom;
                line(sx, -height*2, sx, height*2); // Draw long lines
                
                // Labels
                if (x !== 0) {
                    fill(148, 163, 184);
                    noStroke();
                    textSize(10);
                    textAlign(CENTER, TOP);
                    text(parseFloat(x.toFixed(2)), sx, 5);
                }
                stroke(51, 65, 85); // Reset stroke
            }

            // Horizontal Lines
            let startY = Math.floor(-(height/2 + offsetY) / zoom / step) * step;
            let endY = Math.ceil((height/2 - offsetY) / zoom / step) * step;

            for (let y = startY; y <= endY; y += step) {
                let sy = -y * zoom; // Flip Y for screen
                line(-width*2, sy, width*2, sy);
                
                if (y !== 0) {
                    fill(148, 163, 184);
                    noStroke();
                    textSize(10);
                    textAlign(RIGHT, CENTER);
                    text(parseFloat(y.toFixed(2)) + 'i', -5, sy);
                }
                stroke(51, 65, 85);
            }
        }

        function drawAxes() {
            stroke(203, 213, 225); // Slate 300
            strokeWeight(2);
            // X Axis
            line(-width, 0, width, 0);
            // Y Axis
            line(0, -height, 0, height);
        }

        function drawUnitCircle() {
            noFill();
            stroke(255, 255, 255, 30);
            strokeWeight(2);
            ellipse(0, 0, zoom * 2, zoom * 2); // Diameter = 2 units
            
            // Label
            fill(255, 255, 255, 50);
            noStroke();
            text("Unit Circle (1)", zoom * 0.707 + 5, -zoom * 0.707);
        }

        function drawTrail(currentPos) {
            if (trail.length === 0) return;

            noFill();
            // Gradient trail logic is hard in plain beginShape, simple stroke for now
            stroke(34, 211, 238, 100); 
            strokeWeight(2);
            
            beginShape();
            trail.forEach(pt => {
                vertex(pt.re * zoom, -pt.im * zoom);
            });
            // Connect to current animating position
            vertex(currentPos.re * zoom, -currentPos.im * zoom);
            endShape();

            // Draw points
            fill(34, 211, 238);
            noStroke();
            trail.forEach(pt => {
                circle(pt.re * zoom, -pt.im * zoom, 4);
            });
        }

        function drawVector(z, col, weight, showLabel) {
            let x = z.re * zoom;
            let y = -z.im * zoom; // Flip Y

            stroke(col);
            strokeWeight(weight);
            fill(col);

            // Line
            line(0, 0, x, y);

            // Arrowhead
            push();
            translate(x, y);
            rotate(Math.atan2(y, x)); // Angle for arrowhead
            let arrowSize = 10;
            triangle(0, 0, -arrowSize, arrowSize/2, -arrowSize, -arrowSize/2);
            pop();

            // Label (e.g., coordinates)
            if (showLabel) {
                noStroke();
                fill(255);
                textSize(12);
                textAlign(LEFT, BOTTOM);
                let label = `(${z.re.toFixed(2)}, ${z.im.toFixed(2)}i)`;
                text(label, x + 10, y - 10);
            }
        }
    </script>
</body>
</html>
