<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complex Number Multiplication Visualizer</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- p5.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        
        body {
            font-family: 'JetBrains Mono', monospace;
            background-color: #0f172a; /* Slate 900 */
            color: #e2e8f0;
            overflow: hidden; 
        }

        /* Custom scrollbar for panel */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #1e293b; 
        }
        ::-webkit-scrollbar-thumb {
            background: #475569; 
            border-radius: 3px;
        }

        .input-group label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #94a3b8;
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(8px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="h-screen w-screen flex">

    <!-- Sidebar Controls -->
    <!-- Added overflow-y-auto to ensure buttons are reachable on small screens -->
    <div class="glass-panel w-80 h-full flex flex-col p-6 z-10 shadow-2xl relative overflow-y-auto">
        <h1 class="text-xl font-bold text-cyan-400 mb-1">Argand Diagram</h1>
        <p class="text-xs text-slate-400 mb-4">Complex Multiplication Geometry</p>

        <!-- Mode Toggle -->
        <div class="bg-slate-800 p-1 rounded-lg flex mb-6 border border-slate-700">
            <button id="mode-rect" class="flex-1 py-1 text-xs font-bold rounded text-center transition-colors bg-slate-600 text-white shadow-sm">
                Rectangular
            </button>
            <button id="mode-polar" class="flex-1 py-1 text-xs font-bold rounded text-center transition-colors text-slate-400 hover:text-white">
                Polar
            </button>
        </div>

        <!-- Initial Z Input -->
        <div class="mb-6 border-b border-slate-700 pb-4">
            <h2 class="text-sm font-bold text-white mb-3 flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-cyan-400"></span> Current Z
            </h2>
            <div class="grid grid-cols-2 gap-2">
                <div class="input-group">
                    <label id="lbl-z1">Real (a)</label>
                    <input type="text" id="z-real" value="1" placeholder="e.g. sqrt(3)/2"
                           class="w-full bg-slate-800 border border-slate-600 rounded px-2 py-1 text-sm focus:border-cyan-400 focus:outline-none transition-colors">
                </div>
                <div class="input-group">
                    <label id="lbl-z2">Imag (b)</label>
                    <input type="text" id="z-imag" value="0.5" placeholder="e.g. 0.5"
                           class="w-full bg-slate-800 border border-slate-600 rounded px-2 py-1 text-sm focus:border-cyan-400 focus:outline-none transition-colors">
                </div>
            </div>
            
            <!-- Live Stats for Z -->
            <div class="mt-3 text-xs text-slate-400 space-y-1 bg-slate-800/50 p-2 rounded">
                <div class="flex justify-between">
                    <span>|z| (Mag):</span>
                    <span id="stat-mag" class="text-cyan-300 font-bold">0.00</span>
                </div>
                <div class="flex justify-between">
                    <span>θ (Arg):</span>
                    <span id="stat-arg" class="text-cyan-300 font-bold">0°</span>
                </div>
            </div>
        </div>

        <!-- Multiplier Input -->
        <div class="mb-6 border-b border-slate-700 pb-4">
            <h2 class="text-sm font-bold text-white mb-3 flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-pink-500"></span> Multiplier
            </h2>
            <div class="grid grid-cols-2 gap-2">
                <div class="input-group">
                    <label id="lbl-m1">Real (a)</label>
                    <input type="text" id="m-real" value="1.1" placeholder="e.g. 1.1"
                           class="w-full bg-slate-800 border border-slate-600 rounded px-2 py-1 text-sm focus:border-pink-500 focus:outline-none transition-colors">
                </div>
                <div class="input-group">
                    <label id="lbl-m2">Imag (b)</label>
                    <input type="text" id="m-imag" value="0.2" placeholder="e.g. pi/4"
                           class="w-full bg-slate-800 border border-slate-600 rounded px-2 py-1 text-sm focus:border-pink-500 focus:outline-none transition-colors">
                </div>
            </div>
             <!-- Live Stats for Multiplier -->
             <div class="mt-3 text-xs text-slate-400 space-y-1 bg-slate-800/50 p-2 rounded">
                <div class="flex justify-between">
                    <span>|z| (Mag):</span>
                    <span id="m-stat-mag" class="text-pink-300 font-bold">0.00</span>
                </div>
                <div class="flex justify-between">
                    <span>θ (Arg):</span>
                    <span id="m-stat-arg" class="text-pink-300 font-bold">0°</span>
                </div>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="mt-auto space-y-3 pt-4">
            <button id="btn-multiply" class="w-full bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 text-white font-bold py-3 rounded shadow-lg transform transition active:scale-95 flex justify-center items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd" />
                </svg>
                Multiply
            </button>
            
            <div class="grid grid-cols-2 gap-2">
                <button id="btn-clear-trace" class="bg-slate-700 hover:bg-slate-600 text-slate-200 font-semibold py-2 rounded transition active:scale-95 text-xs uppercase tracking-wide">
                    Clear Trace
                </button>
                <button id="btn-reset" class="bg-slate-700 hover:bg-red-900/50 text-slate-200 hover:text-red-200 font-semibold py-2 rounded transition active:scale-95 text-xs uppercase tracking-wide">
                    Reset All
                </button>
            </div>
        </div>
    </div>

    <!-- Canvas Container -->
    <div id="canvas-container" class="flex-grow h-full relative cursor-crosshair">
        <!-- Overlay Instructions -->
        <div class="absolute top-4 right-4 text-right pointer-events-none opacity-50 text-xs text-white">
            <p>Scroll to Zoom Manually</p>
            <p>Drag to Pan</p>
        </div>
    </div>

    <script>
        // Complex Number Utility Class
        class Complex {
            constructor(re, im) {
                this.re = Number(re);
                this.im = Number(im);
            }

            mult(c) {
                return new Complex(
                    this.re * c.re - this.im * c.im,
                    this.re * c.im + this.im * c.re
                );
            }

            mag() {
                return Math.sqrt(this.re * this.re + this.im * this.im);
            }

            arg() { // Returns radians
                return Math.atan2(this.im, this.re);
            }
            
            argDeg() {
                let deg = this.arg() * (180 / Math.PI);
                return deg.toFixed(1);
            }
        }

        // Global State
        let currentZ;
        let multiplierZ;
        let trail = []; // Array of {re, im}
        let inputMode = 'rectangular'; // 'rectangular' or 'polar'
        let animationState = {
            active: false,
            startZ: null,
            targetZ: null,
            progress: 0,
            duration: 60 // frames
        };

        // Viewport State
        let zoom = 100; // pixels per unit
        let targetZoom = 100;
        let offsetX = 0;
        let offsetY = 0;

        // UI Elements
        const inputs = {
            zRe: document.getElementById('z-real'),
            zIm: document.getElementById('z-imag'),
            mRe: document.getElementById('m-real'),
            mIm: document.getElementById('m-imag'),
            statMag: document.getElementById('stat-mag'),
            statArg: document.getElementById('stat-arg'),
            mStatMag: document.getElementById('m-stat-mag'),
            mStatArg: document.getElementById('m-stat-arg'),
            lblZ1: document.getElementById('lbl-z1'),
            lblZ2: document.getElementById('lbl-z2'),
            lblM1: document.getElementById('lbl-m1'),
            lblM2: document.getElementById('lbl-m2'),
            btnRect: document.getElementById('mode-rect'),
            btnPolar: document.getElementById('mode-polar')
        };

        function setup() {
            const container = document.getElementById('canvas-container');
            const canvas = createCanvas(container.clientWidth, container.clientHeight);
            canvas.parent('canvas-container');
            
            updateFromInputs(); // Initialize values from HTML inputs

            // Event Listeners
            document.getElementById('btn-multiply').addEventListener('click', triggerMultiplication);
            document.getElementById('btn-reset').addEventListener('click', resetVisualization);
            document.getElementById('btn-clear-trace').addEventListener('click', () => { trail = []; });
            
            inputs.btnRect.addEventListener('click', () => setMode('rectangular'));
            inputs.btnPolar.addEventListener('click', () => setMode('polar'));

            // Input Listeners
            ['z-real', 'z-imag', 'm-real', 'm-imag'].forEach(id => {
                document.getElementById(id).addEventListener('input', () => {
                    if (!animationState.active) updateFromInputs();
                });
            });
        }

        function setMode(mode) {
            if (inputMode === mode) return;
            inputMode = mode;

            // Update UI Styles
            if (mode === 'rectangular') {
                inputs.btnRect.className = "flex-1 py-1 text-xs font-bold rounded text-center transition-colors bg-slate-600 text-white shadow-sm";
                inputs.btnPolar.className = "flex-1 py-1 text-xs font-bold rounded text-center transition-colors text-slate-400 hover:text-white";
                
                inputs.lblZ1.innerText = "Real (a)";
                inputs.lblZ2.innerText = "Imag (b)";
                inputs.lblM1.innerText = "Real (a)";
                inputs.lblM2.innerText = "Imag (b)";

                // Convert current values Polar -> Rect
                // Current Z
                inputs.zRe.value = currentZ.re.toFixed(2);
                inputs.zIm.value = currentZ.im.toFixed(2);
                // Multiplier
                inputs.mRe.value = multiplierZ.re.toFixed(2);
                inputs.mIm.value = multiplierZ.im.toFixed(2);

            } else {
                inputs.btnRect.className = "flex-1 py-1 text-xs font-bold rounded text-center transition-colors text-slate-400 hover:text-white";
                inputs.btnPolar.className = "flex-1 py-1 text-xs font-bold rounded text-center transition-colors bg-slate-600 text-white shadow-sm";
                
                inputs.lblZ1.innerText = "Mag (|z|)";
                inputs.lblZ2.innerText = "Angle (°)";
                inputs.lblM1.innerText = "Mag (|z|)";
                inputs.lblM2.innerText = "Angle (°)";

                // Convert current values Rect -> Polar
                // Current Z
                inputs.zRe.value = currentZ.mag().toFixed(2);
                inputs.zIm.value = currentZ.argDeg();
                // Multiplier
                inputs.mRe.value = multiplierZ.mag().toFixed(2);
                inputs.mIm.value = multiplierZ.argDeg();
            }
        }

        function windowResized() {
            const container = document.getElementById('canvas-container');
            resizeCanvas(container.clientWidth, container.clientHeight);
        }

        // Parse math expressions (e.g. "sqrt(3)/2")
        function evaluateExpression(str) {
            if (!str) return 0;
            // Simple check if it's already just a number
            if (!isNaN(str) && !isNaN(parseFloat(str))) return parseFloat(str);

            try {
                // Normalize and sanitize
                let expr = str.toLowerCase();
                
                // Replace common math constants and functions
                // Order matters for some replacements (e.g. pi)
                expr = expr.replace(/pi/g, 'Math.PI');
                expr = expr.replace(/sqrt/g, 'Math.sqrt');
                expr = expr.replace(/\^/g, '**'); // Power
                
                ['sin', 'cos', 'tan', 'abs', 'log', 'exp', 'pow'].forEach(fn => {
                     // Using regex with boundary to avoid replacing inside other words if we had them
                     // but for these short ones simple replace is usually okay for this context
                     expr = expr.replace(new RegExp(fn + '\\(', 'g'), 'Math.' + fn + '(');
                });

                // Safety: Basic evaluation
                const func = new Function('return ' + expr);
                const res = func();
                return isFinite(res) ? res : null;
            } catch (e) {
                return null; // Return null on syntax error (incomplete typing)
            }
        }

        function updateFromInputs() {
            let v1Z = evaluateExpression(inputs.zRe.value);
            let v2Z = evaluateExpression(inputs.zIm.value);
            let v1M = evaluateExpression(inputs.mRe.value);
            let v2M = evaluateExpression(inputs.mIm.value);

            // Validation: Ensure inputs are numbers (not null)
            if (v1Z === null || v2Z === null || v1M === null || v2M === null) return;

            if (inputMode === 'rectangular') {
                if(trail.length === 0) {
                    currentZ = new Complex(v1Z, v2Z);
                }
                multiplierZ = new Complex(v1M, v2M);
            } else {
                // Polar Mode
                // v1 is Magnitude, v2 is Angle (Degrees)
                
                // Convert Z
                if(trail.length === 0) {
                    let radZ = v2Z * (Math.PI / 180);
                    currentZ = new Complex(v1Z * Math.cos(radZ), v1Z * Math.sin(radZ));
                }

                // Convert Multiplier
                let radM = v2M * (Math.PI / 180);
                multiplierZ = new Complex(v1M * Math.cos(radM), v1M * Math.sin(radM));
            }
            
            updateStatsUI();
        }

        function updateStatsUI() {
            // Current Z Stats
            let dispZ = currentZ;
            inputs.statMag.innerText = dispZ.mag().toFixed(2);
            inputs.statArg.innerText = dispZ.argDeg() + "°";

            // Multiplier Stats
            inputs.mStatMag.innerText = multiplierZ.mag().toFixed(2);
            inputs.mStatArg.innerText = multiplierZ.argDeg() + "°";
        }

        function triggerMultiplication() {
            if (animationState.active) {
                finishAnimation();
            }

            let start = currentZ;
            let target = currentZ.mult(multiplierZ);
            
            trail.push({re: start.re, im: start.im});

            animationState.startZ = start;
            animationState.targetZ = target;
            animationState.active = true;
            animationState.progress = 0;
        }

        function finishAnimation() {
            currentZ = animationState.targetZ;
            animationState.active = false;
            animationState.progress = 0;
            updateStatsUI();
        }

        function resetVisualization() {
            trail = [];
            
            // Check current mode to set appropriate defaults
            if (inputMode === 'rectangular') {
                inputs.zRe.value = "1";
                inputs.zIm.value = "0.5";
                inputs.mRe.value = "1.1";
                inputs.mIm.value = "0.2";
            } else {
                // Defaults in polar: 
                // Z = 1 + 0.5i -> Mag ~1.12, Ang ~26.6
                // M = 1.1 + 0.2i -> Mag ~1.12, Ang ~10.3
                inputs.zRe.value = "1.12";
                inputs.zIm.value = "26.6";
                inputs.mRe.value = "1.12";
                inputs.mIm.value = "10.3";
            }

            updateFromInputs(); 

            animationState.active = false;
            targetZoom = 100;
            offsetX = 0;
            offsetY = 0;
        }

        function mouseDragged() {
            if (mouseX > 0 && mouseX < width && mouseY > 0 && mouseY < height) {
                offsetX += movedX;
                offsetY += movedY;
            }
        }
        
        function mouseWheel(event) {
            let zoomSensitivity = 0.05;
            if (event.delta > 0) {
                targetZoom *= (1 - zoomSensitivity);
            } else {
                targetZoom *= (1 + zoomSensitivity);
            }
            return false;
        }

        function draw() {
            background(15, 23, 42); 

            // 1. Handle Animation Logic
            let renderZ = currentZ;
            
            if (animationState.active) {
                let t = animationState.progress / animationState.duration;
                t = 1 - Math.pow(1 - t, 3); 

                let startMag = animationState.startZ.mag();
                let endMag = animationState.targetZ.mag();
                let curMag = lerp(startMag, endMag, t);

                let startArg = animationState.startZ.arg();
                let endArg = animationState.targetZ.arg();
                
                let diff = endArg - startArg;
                while (diff < -PI) diff += TWO_PI;
                while (diff > PI) diff -= TWO_PI;
                let curArg = startArg + diff * t;

                renderZ = new Complex(
                    curMag * Math.cos(curArg),
                    curMag * Math.sin(curArg)
                );

                animationState.progress++;
                if (animationState.progress >= animationState.duration) {
                    finishAnimation();
                }
            }

            // 2. Auto-Zoom Logic
            let maxDist = Math.max(renderZ.mag(), 2);
            if (trail.length > 0) {
                let lastT = trail[trail.length-1];
                let dist = Math.sqrt(lastT.re**2 + lastT.im**2);
                maxDist = Math.max(maxDist, dist);
            }

            let minDimension = Math.min(width, height);
            let idealZoom = (minDimension * 0.35) / maxDist;
            
            if(!mouseIsPressed) { 
                 targetZoom = lerp(targetZoom, idealZoom, 0.05);
            }
            zoom = lerp(zoom, targetZoom, 0.1);

            // 3. Transformations
            push();
            translate(width / 2 + offsetX, height / 2 + offsetY);
            
            drawGrid();
            drawAxes();
            drawUnitCircle();
            drawTrail(renderZ);
            
            // Draw Multiplier Ghost Vector
            drawVector(multiplierZ, color(236, 72, 153, 100), 2, false);

            // Draw Current Vector
            drawVector(renderZ, color(34, 211, 238), 4, true);

            pop();

            if(animationState.active) {
                 inputs.statMag.innerText = renderZ.mag().toFixed(2);
                 inputs.statArg.innerText = renderZ.argDeg() + "°";
            }
        }

        function toScreen(val) {
            return val * zoom;
        }

        function drawGrid() {
            stroke(51, 65, 85); 
            strokeWeight(1);

            let step = 1;
            let pixelStep = step * zoom;
            
            while(pixelStep < 40) { step *= 2; pixelStep = step * zoom; }
            while(pixelStep > 150) { step /= 2; pixelStep = step * zoom; }

            let startX = Math.floor(-(width/2 + offsetX) / zoom / step) * step;
            let endX = Math.ceil((width/2 - offsetX) / zoom / step) * step;
            
            for (let x = startX; x <= endX; x += step) {
                let sx = x * zoom;
                line(sx, -height*2, sx, height*2);
                
                if (x !== 0) {
                    fill(148, 163, 184);
                    noStroke();
                    textSize(10);
                    textAlign(CENTER, TOP);
                    text(parseFloat(x.toFixed(2)), sx, 5);
                }
                stroke(51, 65, 85); 
            }

            let startY = Math.floor(-(height/2 + offsetY) / zoom / step) * step;
            let endY = Math.ceil((height/2 - offsetY) / zoom / step) * step;

            for (let y = startY; y <= endY; y += step) {
                let sy = -y * zoom; 
                line(-width*2, sy, width*2, sy);
                
                if (y !== 0) {
                    fill(148, 163, 184);
                    noStroke();
                    textSize(10);
                    textAlign(RIGHT, CENTER);
                    text(parseFloat(y.toFixed(2)) + 'i', -5, sy);
                }
                stroke(51, 65, 85);
            }
        }

        function drawAxes() {
            stroke(203, 213, 225); 
            strokeWeight(2);
            line(-width, 0, width, 0);
            line(0, -height, 0, height);
        }

        function drawUnitCircle() {
            noFill();
            stroke(255, 255, 255, 30);
            strokeWeight(2);
            ellipse(0, 0, zoom * 2, zoom * 2);
            
            fill(255, 255, 255, 50);
            noStroke();
            text("Unit Circle (1)", zoom * 0.707 + 5, -zoom * 0.707);
        }

        function drawTrail(currentPos) {
            if (trail.length === 0) return;

            noFill();
            stroke(34, 211, 238, 100); 
            strokeWeight(2);
            
            beginShape();
            trail.forEach(pt => {
                vertex(pt.re * zoom, -pt.im * zoom);
            });
            vertex(currentPos.re * zoom, -currentPos.im * zoom);
            endShape();

            fill(34, 211, 238);
            noStroke();
            trail.forEach(pt => {
                circle(pt.re * zoom, -pt.im * zoom, 4);
            });
        }

        function drawVector(z, col, weight, showLabel) {
            let x = z.re * zoom;
            let y = -z.im * zoom; 

            stroke(col);
            strokeWeight(weight);
            fill(col);

            line(0, 0, x, y);

            push();
            translate(x, y);
            rotate(Math.atan2(y, x)); 
            let arrowSize = 10;
            triangle(0, 0, -arrowSize, arrowSize/2, -arrowSize, -arrowSize/2);
            pop();

            if (showLabel) {
                noStroke();
                fill(255);
                textSize(12);
                textAlign(LEFT, BOTTOM);
                let label = `(${z.re.toFixed(2)}, ${z.im.toFixed(2)}i)`;
                text(label, x + 10, y - 10);
            }
        }
    </script>
</body>
</html>
