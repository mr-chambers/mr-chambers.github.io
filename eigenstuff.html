<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Differential Equations Phase Portrait Explorer</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX compilation in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- KaTeX for math rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js" crossorigin="anonymous"></script>

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f8fafc; }
        .matrix-input { width: 4rem; text-align: center; }
        .katex-display { margin: 0.5em 0 !important; }
        canvas { touch-action: none; cursor: crosshair; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo, useCallback } = React;

        // --- Math Utility Functions ---
        
        const formatNumber = (num, decimals = 3) => {
            if (num === null || num === undefined) return '';
            return Number(Math.round(num + 'e' + decimals) + 'e-' + decimals);
        };

        const calculateEigen = (a, b, c, d) => {
            const T = a + d;
            const D = a * d - b * c;
            const delta = T * T - 4 * D;

            const normalize = (x, y) => {
                const mag = Math.sqrt(x * x + y * y);
                return mag === 0 ? { x: 0, y: 0 } : { x: x / mag, y: y / mag };
            };

            const getEigVec = (lambda) => {
                if (Math.abs(b) > 1e-6) return normalize(b, lambda - a);
                if (Math.abs(c) > 1e-6) return normalize(lambda - d, c);
                return { x: 1, y: 0 };
            };

            if (delta > 0) {
                const l1 = (T + Math.sqrt(delta)) / 2;
                const l2 = (T - Math.sqrt(delta)) / 2;
                return { 
                    type: 'real', l1, l2, 
                    v1: getEigVec(l1), v2: getEigVec(l2),
                    T, D, delta
                };
            } else if (delta === 0) {
                const l = T / 2;
                const v1 = getEigVec(l);
                const isStar = Math.abs(b) < 1e-6 && Math.abs(c) < 1e-6;
                let v2 = null;
                if (!isStar) {
                    if (Math.abs(b) > 1e-6) v2 = { x: 0, y: v1.x / b };
                    else if (Math.abs(c) > 1e-6) v2 = { x: v1.y / c, y: 0 };
                    else v2 = { x: 1, y: 0 };
                } else {
                    v2 = { x: 0, y: 1 };
                }
                return { type: 'repeated', l, v1, v2, isStar, T, D, delta };
            } else {
                const alpha = T / 2;
                const beta = Math.sqrt(-delta) / 2;
                let u, w;
                if (Math.abs(b) > 1e-6) {
                    u = { x: b, y: alpha - a };
                    w = { x: 0, y: beta };
                } else {
                    u = { x: alpha - d, y: c };
                    w = { x: Math.abs(beta), y: 0 };
                }
                return { type: 'complex', alpha, beta, u, w, T, D, delta };
            }
        };

        const rk4Step = (x, y, dt, a, b, c, d) => {
            const f = (vx, vy) => ({ dx: a * vx + b * vy, dy: c * vx + d * vy });
            const k1 = f(x, y);
            const k2 = f(x + 0.5 * dt * k1.dx, y + 0.5 * dt * k1.dy);
            const k3 = f(x + 0.5 * dt * k2.dx, y + 0.5 * dt * k2.dy);
            const k4 = f(x + dt * k3.dx, y + dt * k3.dy);
            return {
                x: x + (dt / 6) * (k1.dx + 2 * k2.dx + 2 * k3.dx + k4.dx),
                y: y + (dt / 6) * (k1.dy + 2 * k2.dy + 2 * k3.dy + k4.dy)
            };
        };

        const generatePath = (startX, startY, a, b, c, d, direction = 1) => {
            const path = [{ x: startX, y: startY }];
            let curX = startX, curY = startY;
            const dt = 0.05 * direction;
            const maxSteps = 400; // Limits animation length
            
            for (let i = 0; i < maxSteps; i++) {
                const next = rk4Step(curX, curY, dt, a, b, c, d);
                // Stop if we fly off the canvas widely
                if (Math.abs(next.x) > 25 || Math.abs(next.y) > 25) break;
                
                // Stop if equilibrium reached
                const vel = Math.sqrt((next.x - curX) ** 2 + (next.y - curY) ** 2);
                if (vel < 1e-5) break;

                path.push(next);
                curX = next.x; curY = next.y;
            }
            return path;
        };

        const classifySystem = (eigs) => {
            if (eigs.type === 'real') {
                if (eigs.l1 > 0 && eigs.l2 > 0) return { name: 'Unstable Node (Source)', color: 'text-red-600', bg: 'bg-red-50' };
                if (eigs.l1 < 0 && eigs.l2 < 0) return { name: 'Stable Node (Sink)', color: 'text-green-600', bg: 'bg-green-50' };
                if (eigs.l1 * eigs.l2 < 0) return { name: 'Saddle Point', color: 'text-orange-600', bg: 'bg-orange-50' };
                return { name: 'Degenerate System', color: 'text-slate-600', bg: 'bg-slate-50' };
            } else if (eigs.type === 'complex') {
                if (eigs.alpha > 0) return { name: 'Unstable Spiral (Source)', color: 'text-red-600', bg: 'bg-red-50' };
                if (eigs.alpha < 0) return { name: 'Stable Spiral (Sink)', color: 'text-green-600', bg: 'bg-green-50' };
                return { name: 'Center', color: 'text-blue-600', bg: 'bg-blue-50' };
            } else if (eigs.type === 'repeated') {
                if (eigs.l > 0) return { name: eigs.isStar ? 'Unstable Star Node' : 'Unstable Degenerate Node', color: 'text-red-600', bg: 'bg-red-50' };
                if (eigs.l < 0) return { name: eigs.isStar ? 'Stable Star Node' : 'Stable Degenerate Node', color: 'text-green-600', bg: 'bg-green-50' };
                return { name: 'Uniform Motion', color: 'text-slate-600', bg: 'bg-slate-50' };
            }
            return { name: 'Unknown', color: 'text-slate-600', bg: 'bg-slate-50' };
        };

        // --- React Components ---

        const TeX = ({ math, block = false }) => {
            const containerRef = useRef(null);

            useEffect(() => {
                if (containerRef.current && window.katex) {
                    window.katex.render(math, containerRef.current, {
                        displayMode: block,
                        throwOnError: false,
                    });
                }
            }, [math, block]);

            return <span ref={containerRef} />;
        };

        const App = () => {
            const [matrix, setMatrix] = useState({ a: -1, b: -1, c: 1, d: -1 });
            const [clicks, setClicks] = useState([]); // [{x, y, forwardPath, backwardPath}]
            const [probe, setProbe] = useState({ active: false, x: 4, y: 4 });
            const [showEigenvectors, setShowEigenvectors] = useState(true);
            const pointerState = useRef({ isDown: false, startX: 0, startY: 0, hasDragged: false });
            const canvasRef = useRef(null);
            const requestRef = useRef();
            const animationStepRef = useRef(0);

            const eigs = useMemo(() => calculateEigen(matrix.a, matrix.b, matrix.c, matrix.d), [matrix]);
            const sysClass = useMemo(() => classifySystem(eigs), [eigs]);

            const PRESETS = [
                { label: 'Saddle', m: {a: 1, b: 3, c: 2, d: 0} },
                { label: 'Stable Node', m: {a: -2, b: 0, c: 0, d: -3} },
                { label: 'Spiral Sink', m: {a: -1, b: -2, c: 2, d: -1} },
                { label: 'Center', m: {a: 0, b: 2, c: -2, d: 0} }
            ];

            const handleMatrixChange = (key, value) => {
                const val = parseFloat(value);
                setMatrix(prev => ({ ...prev, [key]: isNaN(val) ? 0 : val }));
                setClicks([]); // Clear trajectories when matrix changes
                animationStepRef.current = 0;
            };

            const handlePointerDown = (e) => {
                canvasRef.current.setPointerCapture(e.pointerId);
                pointerState.current = { 
                    isDown: true, 
                    startX: e.clientX, 
                    startY: e.clientY, 
                    hasDragged: false 
                };

                // Instantly move probe to touch location
                const rect = canvasRef.current.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const mathX = Math.max(-10, Math.min(10, ((x / rect.width) * 20) - 10));
                const mathY = Math.max(-10, Math.min(10, 10 - ((y / rect.height) * 20)));
                
                setProbe({ active: true, x: mathX, y: mathY });
            };

            const handlePointerMove = (e) => {
                if (!pointerState.current.isDown) return;
                
                const dx = e.clientX - pointerState.current.startX;
                const dy = e.clientY - pointerState.current.startY;
                
                // Threshold to distinguish between a tap/click and a drag
                if (Math.sqrt(dx * dx + dy * dy) > 4) {
                    pointerState.current.hasDragged = true;
                }

                const rect = canvasRef.current.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const mathX = Math.max(-10, Math.min(10, ((x / rect.width) * 20) - 10));
                const mathY = Math.max(-10, Math.min(10, 10 - ((y / rect.height) * 20)));
                
                setProbe({ active: true, x: mathX, y: mathY });
            };

            const handlePointerUp = (e) => {
                if (!pointerState.current.isDown) return;
                pointerState.current.isDown = false;
                canvasRef.current.releasePointerCapture(e.pointerId);
                
                setProbe(p => ({ ...p, active: false }));

                if (!pointerState.current.hasDragged) {
                    // It was a click/tap without moving: spawn trajectory
                    const rect = canvasRef.current.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    const mathX = ((x / rect.width) * 20) - 10;
                    const mathY = 10 - ((y / rect.height) * 20);

                    const forwardPath = generatePath(mathX, mathY, matrix.a, matrix.b, matrix.c, matrix.d, 1);
                    const backwardPath = generatePath(mathX, mathY, matrix.a, matrix.b, matrix.c, matrix.d, -1);
                    
                    setClicks(prev => [...prev, { mathX, mathY, forwardPath, backwardPath }]);
                }
            };

            // Canvas Drawing Logic
            const drawCanvas = useCallback(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                
                const ctx = canvas.getContext('2d');
                const rect = canvas.getBoundingClientRect();
                const dpr = window.devicePixelRatio || 1;

                // Configure for High DPI displays
                if (canvas.width !== rect.width * dpr || canvas.height !== rect.height * dpr) {
                    canvas.width = rect.width * dpr;
                    canvas.height = rect.height * dpr;
                    ctx.scale(dpr, dpr);
                }

                const width = rect.width;
                const height = rect.height;

                const mapX = x => (x + 10) / 20 * width;
                const mapY = y => (10 - y) / 20 * height;

                ctx.clearRect(0, 0, width, height);

                // Draw Grid & Axes
                ctx.lineWidth = 1;
                for(let i = -10; i <= 10; i++) {
                    ctx.beginPath();
                    ctx.strokeStyle = i === 0 ? '#475569' : '#e2e8f0';
                    ctx.moveTo(mapX(i), 0);
                    ctx.lineTo(mapX(i), height);
                    ctx.stroke();

                    ctx.beginPath();
                    ctx.moveTo(0, mapY(i));
                    ctx.lineTo(width, mapY(i));
                    ctx.stroke();
                }

                // Draw Slope Field
                ctx.strokeStyle = '#94a3b8'; // Slate 400
                ctx.lineWidth = 1.5;
                const step = 1;
                for (let x = -10; x <= 10; x += step) {
                    for (let y = -10; y <= 10; y += step) {
                        const dx = matrix.a * x + matrix.b * y;
                        const dy = matrix.c * x + matrix.d * y;
                        const mag = Math.sqrt(dx*dx + dy*dy);
                        if (mag === 0) continue;

                        const scale = 0.35 / mag;
                        const ax = dx * scale;
                        const ay = dy * scale;

                        const startX = x - ax/2;
                        const startY = y - ay/2;
                        const endX = x + ax/2;
                        const endY = y + ay/2;

                        ctx.beginPath();
                        ctx.moveTo(mapX(startX), mapY(startY));
                        ctx.lineTo(mapX(endX), mapY(endY));
                        ctx.stroke();

                        // Arrowhead
                        const angle = Math.atan2(mapY(endY) - mapY(startY), mapX(endX) - mapX(startX));
                        ctx.beginPath();
                        ctx.moveTo(mapX(endX), mapY(endY));
                        ctx.lineTo(mapX(endX) - 4 * Math.cos(angle - Math.PI/6), mapY(endY) - 4 * Math.sin(angle - Math.PI/6));
                        ctx.stroke();
                        ctx.beginPath();
                        ctx.moveTo(mapX(endX), mapY(endY));
                        ctx.lineTo(mapX(endX) - 4 * Math.cos(angle + Math.PI/6), mapY(endY) - 4 * Math.sin(angle + Math.PI/6));
                        ctx.stroke();
                    }
                }

                // Draw Eigenlines
                if (showEigenvectors) {
                    const drawEigenline = (v, color) => {
                        ctx.strokeStyle = color;
                        ctx.setLineDash([5, 5]);
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.moveTo(mapX(-30 * v.x), mapY(-30 * v.y));
                        ctx.lineTo(mapX(30 * v.x), mapY(30 * v.y));
                        ctx.stroke();
                        ctx.setLineDash([]); // Reset
                    };

                    if (eigs.type === 'real' || eigs.type === 'repeated') {
                        if (eigs.v1) drawEigenline(eigs.v1, '#ef4444'); // Red
                        if (eigs.v2 && !eigs.isStar) drawEigenline(eigs.v2, '#3b82f6'); // Blue
                    }
                }

                // Draw Interactive Probe Vector
                const dx = matrix.a * probe.x + matrix.b * probe.y;
                const dy = matrix.c * probe.x + matrix.d * probe.y;
                
                const magX = Math.sqrt(probe.x**2 + probe.y**2);
                const magDX = Math.sqrt(dx**2 + dy**2);
                // Check if parallel using sin(theta)
                const isEigen = magX > 0.5 && magDX > 0.1 && (Math.abs(probe.x * dy - probe.y * dx) / (magX * magDX)) < 0.05;
                
                const probeColor = isEigen ? '#eab308' : '#64748b'; // Gold if eigenvector
                const transformColor = isEigen ? '#eab308' : '#a855f7'; // Purple normally
                
                const drawArrow = (fromX, fromY, toX, toY, color, width) => {
                    ctx.strokeStyle = color;
                    ctx.fillStyle = color;
                    ctx.lineWidth = width;
                    ctx.beginPath();
                    ctx.moveTo(mapX(fromX), mapY(fromY));
                    ctx.lineTo(mapX(toX), mapY(toY));
                    ctx.stroke();

                    const angle = Math.atan2(mapY(toY) - mapY(fromY), mapX(toX) - mapX(fromX));
                    ctx.beginPath();
                    ctx.moveTo(mapX(toX), mapY(toY));
                    ctx.lineTo(mapX(toX) - 12 * Math.cos(angle - Math.PI/7), mapY(toY) - 12 * Math.sin(angle - Math.PI/7));
                    ctx.lineTo(mapX(toX) - 12 * Math.cos(angle + Math.PI/7), mapY(toY) - 12 * Math.sin(angle + Math.PI/7));
                    ctx.fill();
                };

                // Position Vector x
                drawArrow(0, 0, probe.x, probe.y, probeColor, isEigen ? 3 : 2);
                // Velocity Vector Ax (scaled down slightly for visual clarity if it's huge)
                drawArrow(probe.x, probe.y, probe.x + dx * 0.4, probe.y + dy * 0.4, transformColor, isEigen ? 4 : 2);
                
                // Probe Drag Handle
                ctx.beginPath();
                ctx.arc(mapX(probe.x), mapY(probe.y), 8, 0, 2 * Math.PI);
                ctx.fillStyle = probe.active ? '#fbbf24' : '#f8fafc';
                ctx.fill();
                ctx.lineWidth = 3;
                ctx.strokeStyle = probeColor;
                ctx.stroke();

                // Draw Trajectories
                clicks.forEach((click, i) => {
                    const color = `hsl(${(i * 137.5) % 360}, 70%, 50%)`; // Distinct colors
                    ctx.strokeStyle = color;
                    ctx.lineWidth = 2.5;
                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';

                    // Draw backward path (instantly fully drawn)
                    ctx.beginPath();
                    ctx.globalAlpha = 0.4; // Slightly transparent past
                    if (click.backwardPath.length > 0) {
                        ctx.moveTo(mapX(click.backwardPath[0].x), mapY(click.backwardPath[0].y));
                        for (let j = 1; j < click.backwardPath.length; j++) {
                            ctx.lineTo(mapX(click.backwardPath[j].x), mapY(click.backwardPath[j].y));
                        }
                    }
                    ctx.stroke();
                    ctx.globalAlpha = 1.0;

                    // Draw forward path (animated)
                    ctx.beginPath();
                    if (click.forwardPath.length > 0) {
                        ctx.moveTo(mapX(click.forwardPath[0].x), mapY(click.forwardPath[0].y));
                        const maxDraw = Math.min(animationStepRef.current, click.forwardPath.length);
                        for (let j = 1; j < maxDraw; j++) {
                            ctx.lineTo(mapX(click.forwardPath[j].x), mapY(click.forwardPath[j].y));
                        }
                        ctx.stroke();

                        // Draw moving head
                        if (maxDraw > 0) {
                            const head = click.forwardPath[maxDraw - 1];
                            ctx.beginPath();
                            ctx.arc(mapX(head.x), mapY(head.y), 4, 0, 2 * Math.PI);
                            ctx.fillStyle = color;
                            ctx.fill();
                        }
                    }
                });

                // Draw Origin
                ctx.beginPath();
                ctx.arc(mapX(0), mapY(0), 5, 0, 2 * Math.PI);
                ctx.fillStyle = '#0f172a';
                ctx.fill();

            }, [matrix, eigs, clicks, probe, showEigenvectors]);

            const animate = useCallback(() => {
                animationStepRef.current += 2; // Animation speed
                drawCanvas();
                requestRef.current = requestAnimationFrame(animate);
            }, [drawCanvas]);

            useEffect(() => {
                requestRef.current = requestAnimationFrame(animate);
                return () => cancelAnimationFrame(requestRef.current);
            }, [animate]);

            // Construct LaTeX string for general solution
            const getSolutionString = () => {
                const f = formatNumber;
                let str = '';
                if (eigs.type === 'real') {
                    str = `\\mathbf{x}(t) = c_1 e^{${f(eigs.l1)}t} \\begin{pmatrix} ${f(eigs.v1.x)} \\\\ ${f(eigs.v1.y)} \\end{pmatrix} + c_2 e^{${f(eigs.l2)}t} \\begin{pmatrix} ${f(eigs.v2.x)} \\\\ ${f(eigs.v2.y)} \\end{pmatrix}`;
                } else if (eigs.type === 'repeated') {
                    if (eigs.isStar) {
                        str = `\\mathbf{x}(t) = c_1 e^{${f(eigs.l)}t} \\begin{pmatrix} 1 \\\\ 0 \\end{pmatrix} + c_2 e^{${f(eigs.l)}t} \\begin{pmatrix} 0 \\\\ 1 \\end{pmatrix}`;
                    } else {
                        str = `\\mathbf{x}(t) = c_1 e^{${f(eigs.l)}t} \\begin{pmatrix} ${f(eigs.v1.x)} \\\\ ${f(eigs.v1.y)} \\end{pmatrix} + c_2 e^{${f(eigs.l)}t} \\left[ \\begin{pmatrix} ${f(eigs.v1.x)} \\\\ ${f(eigs.v1.y)} \\end{pmatrix}t + \\begin{pmatrix} ${f(eigs.v2.x)} \\\\ ${f(eigs.v2.y)} \\end{pmatrix} \\right]`;
                    }
                } else if (eigs.type === 'complex') {
                    str = `\\mathbf{x}(t) = e^{${f(eigs.alpha)}t} \\left[ c_1 \\left( \\cos(${f(eigs.beta)}t) \\mathbf{u} - \\sin(${f(eigs.beta)}t) \\mathbf{w} \\right) + c_2 \\left( \\sin(${f(eigs.beta)}t) \\mathbf{u} + \\cos(${f(eigs.beta)}t) \\mathbf{w} \\right) \\right]`;
                }
                return str;
            };

            return (
                <div className="min-h-screen p-6 max-w-7xl mx-auto flex flex-col lg:flex-row gap-8">
                    {/* Left Sidebar - Math & Inputs */}
                    <div className="w-full lg:w-1/3 space-y-6">
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                            <div className="flex justify-between items-start mb-2">
                                <h1 className="text-2xl font-bold text-slate-800">Phase Portrait</h1>
                                <span className={`px-3 py-1 rounded-full text-xs font-bold ${sysClass.bg} ${sysClass.color} border border-current opacity-80`}>
                                    {sysClass.name}
                                </span>
                            </div>
                            <p className="text-slate-500 mb-6 text-sm">Visualize 2D systems of the form <TeX math="\mathbf{x}' = A\mathbf{x}" /></p>

                            <div className="mb-6 flex flex-wrap gap-2">
                                {PRESETS.map(p => (
                                    <button 
                                        key={p.label}
                                        onClick={() => { setMatrix(p.m); setClicks([]); animationStepRef.current = 0; }}
                                        className="text-xs font-medium bg-slate-100 hover:bg-slate-200 text-slate-700 px-3 py-1.5 rounded-full transition-colors"
                                    >
                                        {p.label}
                                    </button>
                                ))}
                            </div>

                            <h2 className="text-sm font-semibold text-slate-700 uppercase tracking-wide mb-4">Matrix <TeX math="A" /></h2>
                            <div className="flex justify-center mb-6">
                                <div className="grid grid-cols-2 gap-2 p-4 bg-slate-50 rounded-xl border border-slate-200 shadow-inner">
                                    <input type="number" step="0.1" value={matrix.a} onChange={(e) => handleMatrixChange('a', e.target.value)} className="matrix-input p-2 rounded border focus:ring-2 focus:ring-blue-500 outline-none text-lg font-mono" />
                                    <input type="number" step="0.1" value={matrix.b} onChange={(e) => handleMatrixChange('b', e.target.value)} className="matrix-input p-2 rounded border focus:ring-2 focus:ring-blue-500 outline-none text-lg font-mono" />
                                    <input type="number" step="0.1" value={matrix.c} onChange={(e) => handleMatrixChange('c', e.target.value)} className="matrix-input p-2 rounded border focus:ring-2 focus:ring-blue-500 outline-none text-lg font-mono" />
                                    <input type="number" step="0.1" value={matrix.d} onChange={(e) => handleMatrixChange('d', e.target.value)} className="matrix-input p-2 rounded border focus:ring-2 focus:ring-blue-500 outline-none text-lg font-mono" />
                                </div>
                            </div>

                            <div className="space-y-4 text-slate-700">
                                <div>
                                    <div className="text-xs font-bold text-slate-400 uppercase tracking-wide mb-1">Eigenvalues & Eigenvectors</div>
                                    {eigs.type === 'real' && (
                                        <div className="bg-blue-50/50 p-3 rounded-lg border border-blue-100">
                                            <p className="mb-2 text-blue-900"><TeX math={`\\lambda_1 = ${formatNumber(eigs.l1)}, \\quad \\mathbf{v}_1 = \\begin{pmatrix} ${formatNumber(eigs.v1.x)} \\\\ ${formatNumber(eigs.v1.y)} \\end{pmatrix}`} block/></p>
                                            <p className="text-blue-900"><TeX math={`\\lambda_2 = ${formatNumber(eigs.l2)}, \\quad \\mathbf{v}_2 = \\begin{pmatrix} ${formatNumber(eigs.v2.x)} \\\\ ${formatNumber(eigs.v2.y)} \\end{pmatrix}`} block/></p>
                                        </div>
                                    )}
                                    {eigs.type === 'repeated' && (
                                        <div className="bg-yellow-50/50 p-3 rounded-lg border border-yellow-100">
                                            <p className="mb-2 text-yellow-900"><TeX math={`\\lambda = ${formatNumber(eigs.l)} \\text{ (Repeated)}`} block/></p>
                                            <p className="mb-2 text-yellow-900"><TeX math={`\\mathbf{v}_1 = \\begin{pmatrix} ${formatNumber(eigs.v1.x)} \\\\ ${formatNumber(eigs.v1.y)} \\end{pmatrix}`} block/></p>
                                            {!eigs.isStar && <p className="text-yellow-900"><TeX math={`\\mathbf{v}_2 \\text{ (Generalized)} = \\begin{pmatrix} ${formatNumber(eigs.v2.x)} \\\\ ${formatNumber(eigs.v2.y)} \\end{pmatrix}`} block/></p>}
                                        </div>
                                    )}
                                    {eigs.type === 'complex' && (
                                        <div className="bg-purple-50/50 p-3 rounded-lg border border-purple-100">
                                            <p className="mb-2 text-purple-900"><TeX math={`\\lambda = ${formatNumber(eigs.alpha)} \\pm ${formatNumber(eigs.beta)}i`} block/></p>
                                            <p className="mb-2 text-purple-900"><TeX math={`\\mathbf{u} = \\begin{pmatrix} ${formatNumber(eigs.u.x)} \\\\ ${formatNumber(eigs.u.y)} \\end{pmatrix}, \\quad \\mathbf{w} = \\begin{pmatrix} ${formatNumber(eigs.w.x)} \\\\ ${formatNumber(eigs.w.y)} \\end{pmatrix}`} block/></p>
                                        </div>
                                    )}
                                </div>

                                <div>
                                    <div className="text-xs font-bold text-slate-400 uppercase tracking-wide mb-1">General Solution</div>
                                    <div className="bg-slate-50 p-4 rounded-lg border border-slate-200 overflow-x-auto">
                                        <TeX math={getSolutionString()} block />
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Right Area - Canvas */}
                    <div className="w-full lg:w-2/3 flex flex-col items-center justify-center">
                        <div className="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 w-full relative">
                            <div className="absolute top-6 left-6 flex space-x-2 z-10 pointer-events-none">
                                <span className="bg-white/90 backdrop-blur-sm px-4 py-1.5 rounded-full text-xs font-semibold text-slate-700 border border-slate-200 shadow-sm shadow-slate-200/50">
                                    Click to trace &bull; Drag to explore
                                </span>
                            </div>
                            <div className="absolute top-6 right-6 z-10 flex space-x-2">
                                <button 
                                    onClick={() => setShowEigenvectors(!showEigenvectors)}
                                    className={`px-4 py-1.5 rounded-full text-sm font-medium transition-colors shadow-sm border ${showEigenvectors ? 'bg-blue-50 text-blue-700 border-blue-200 hover:bg-blue-100' : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-50'}`}
                                >
                                    {showEigenvectors ? 'Hide Eigenlines' : 'Show Eigenlines'}
                                </button>
                                <button 
                                    onClick={() => setClicks([])}
                                    className="bg-white hover:bg-red-50 text-red-600 border border-red-200 px-4 py-1.5 rounded-full text-sm font-medium transition-colors shadow-sm"
                                >
                                    Clear Traces
                                </button>
                            </div>
                            
                            {/* Responsive Canvas Container */}
                            <div className="w-full aspect-square max-h-[80vh] bg-slate-50 rounded-xl overflow-hidden border border-slate-200">
                                <canvas 
                                    ref={canvasRef} 
                                    onPointerDown={handlePointerDown}
                                    onPointerMove={handlePointerMove}
                                    onPointerUp={handlePointerUp}
                                    onPointerLeave={handlePointerUp}
                                    className="w-full h-full block touch-none"
                                />
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
